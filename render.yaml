services:
  - type: web
    name: aero-web-control
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: aero-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: PRESENCE_TTL_SECONDS
        value: 60
      - key: CORS_ORIGIN
        value: "https://1bladess.github.io"
